name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      LOFTLY_ENV: test
      DATABASE_URL: sqlite+aiosqlite:///:memory:
      JWT_SIGNING_KEY: ci-secret
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.10.8"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint (ruff check)
        run: uv run ruff check .

      - name: Format check (ruff format)
        run: uv run ruff format --check .

      - name: Type check (mypy)
        run: uv run mypy src/

      - name: Test (pytest)
        run: uv run pytest -q

  selector_eval:
    name: Selector golden-set recall (≥ LOFTLY_EVAL_MIN_RECALL)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Always runs on PRs + push to main. The prior path-gated `if:` was a no-op
    # (contains(...) on github.event.pull_request.changed_files — an integer,
    # not a list — always returned false), so it was silently skipping.
    env:
      LOFTLY_ENV: test
      DATABASE_URL: sqlite+aiosqlite:///:memory:
      JWT_SIGNING_KEY: ci-secret
      LOFTLY_EVAL_MIN_RECALL: "0.75"
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.10.8"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run Selector golden-set eval (deterministic)
        run: uv run python -m scripts.run_selector_eval --provider deterministic --verbose --json > eval-result.json

      - name: Upload eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selector-eval-report
          path: eval-result.json
          retention-days: 14
