name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      LOFTLY_ENV: test
      DATABASE_URL: sqlite+aiosqlite:///:memory:
      JWT_SIGNING_KEY: ci-secret
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.10.8"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint (ruff check)
        run: uv run ruff check .

      - name: Format check (ruff format)
        run: uv run ruff format --check .

      - name: Type check (mypy)
        run: uv run mypy src/

      - name: Test (pytest)
        run: uv run pytest -q

  selector_eval:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Only run when AI wiring or eval fixtures change. Still a merge-blocker.
    if: |
      contains(github.event.pull_request.changed_files, 'src/loftly/ai/') ||
      contains(github.event.pull_request.changed_files, 'src/loftly/data/selector_eval/') ||
      github.event_name == 'push'
    env:
      LOFTLY_ENV: test
      DATABASE_URL: sqlite+aiosqlite:///:memory:
      JWT_SIGNING_KEY: ci-secret
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.10.8"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run Selector golden-set eval (deterministic)
        run: uv run python -m scripts.run_selector_eval --provider deterministic --verbose
