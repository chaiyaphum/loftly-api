# fly.toml — loftly-api staging
# See ../loftly/mvp/DEPLOYMENT.md. Prod uses a separate app (loftly-api-prod).

app = "loftly-api-staging"
primary_region = "sin"   # closest Fly.io region to TH until AWS ap-southeast-7 in Phase 2

kill_signal = "SIGINT"
kill_timeout = "10s"

[build]
  dockerfile = "Dockerfile"

[env]
  LOFTLY_ENV = "staging"
  PORT = "8000"

[deploy]
  release_command = "alembic upgrade head"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    type = "http"
    interval = "30s"
    timeout = "5s"
    grace_period = "20s"
    method = "GET"
    path = "/healthz"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpus = 1
